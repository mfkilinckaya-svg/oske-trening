<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSKE – Tidligere Eksamensoppgaver</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e28;
    --border: #252a38;
    --text: #e8eaf0;
    --muted: #8892aa;
    --accent1: #e8b86d; /* gold */
    --accent2: #6db8e8; /* blue */
    --accent3: #e86d8a; /* red/pink */
    --accent4: #6de8b0; /* green */
    --accent5: #b86de8; /* purple */
    --accent6: #e8d06d; /* yellow */
    --accent7: #6de8d0; /* teal */
    --accent8: #e8906d; /* orange */
    --accent9: #8de86d; /* lime */
    --accent10: #e86db8; /* magenta */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 22px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }
  .site-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--accent1);
    letter-spacing: 0.02em;
  }
  .site-header .sub {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 3px;
  }
  .progress-bar-wrap {
    flex: 1;
    max-width: 340px;
    margin-left: 30px;
  }
  .progress-label {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
  }
  .progress-track {
    background: var(--border);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* SIDEBAR + MAIN */
  .layout {
    display: flex;
    min-height: calc(100vh - 80px);
  }

  .sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
  }

  .sidebar-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0 20px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: var(--bg3); }
  .nav-item.active {
    background: var(--bg3);
    border-left-color: var(--item-color, var(--accent1));
  }
  .nav-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--item-color, var(--muted));
    min-width: 22px;
  }
  .nav-label {
    font-size: 0.82rem;
    color: var(--text);
    line-height: 1.3;
  }
  .nav-check {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--accent4);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .nav-item.done .nav-check { opacity: 1; }

  /* MAIN CONTENT */
  .main {
    flex: 1;
    padding: 40px;
    max-width: 820px;
  }

  /* STATION CARD */
  .station {
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .station.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .station-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .station-num {
    font-family: 'Playfair Display', serif;
    font-size: 3.5rem;
    color: var(--item-color, var(--accent1));
    opacity: 0.25;
    line-height: 1;
    min-width: 60px;
  }
  .station-meta {}
  .station-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--item-color, var(--accent1));
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .station-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .station-scenario {
    font-size: 0.88rem;
    color: var(--muted);
    font-style: italic;
    background: var(--bg3);
    border-left: 3px solid var(--item-color, var(--accent1));
    padding: 10px 16px;
    border-radius: 0 6px 6px 0;
    margin-top: 10px;
  }

  /* SECTIONS */
  .section {
    margin-bottom: 28px;
  }
  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--item-color, var(--accent1));
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Q&A BLOCKS */
  .qa-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .qa-question {
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: background 0.2s;
  }
  .qa-question:hover { background: var(--bg3); }
  .qa-q-icon {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--item-color, var(--accent1));
    background: rgba(255,255,255,0.05);
    padding: 2px 7px;
    border-radius: 4px;
    min-width: 26px;
    text-align: center;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .qa-q-text {
    font-size: 0.9rem;
    color: var(--text);
    flex: 1;
    font-weight: 600;
  }
  .qa-toggle {
    color: var(--muted);
    font-size: 0.85rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .qa-answer {
    display: none;
    padding: 0 18px 16px 56px;
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.75;
    border-top: 1px solid var(--border);
  }
  .qa-answer.open { display: block; }
  .qa-toggle.open { transform: rotate(180deg); }

  /* LISTS */
  .answer-list {
    list-style: none;
    padding: 0;
    margin: 8px 0;
  }
  .answer-list li {
    padding: 4px 0 4px 20px;
    position: relative;
    color: var(--muted);
  }
  .answer-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--item-color, var(--accent1));
    font-size: 0.75rem;
  }

  /* INFO PILLS */
  .pill-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 10px 0;
  }
  .pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid;
    line-height: 1;
  }
  .pill-good { color: var(--accent4); border-color: var(--accent4); background: rgba(109,232,176,0.07); }
  .pill-warn { color: var(--accent6); border-color: var(--accent6); background: rgba(232,208,109,0.07); }
  .pill-bad { color: var(--accent3); border-color: var(--accent3); background: rgba(232,109,138,0.07); }
  .pill-info { color: var(--accent2); border-color: var(--accent2); background: rgba(109,184,232,0.07); }
  .pill-purple { color: var(--accent5); border-color: var(--accent5); background: rgba(184,109,232,0.07); }

  /* TABLE */
  .info-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
    margin: 10px 0;
  }
  .info-table th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--item-color, var(--accent1));
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    letter-spacing: 0.06em;
  }
  .info-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    vertical-align: top;
  }
  .info-table tr:last-child td { border-bottom: none; }
  .info-table tr:hover td { background: var(--bg3); }

  /* HIGHLIGHT BOX */
  .highlight-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--item-color, var(--accent1));
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    margin: 12px 0;
    font-size: 0.87rem;
    color: var(--text);
  }
  .highlight-box strong {
    color: var(--item-color, var(--accent1));
    font-weight: 600;
  }

  /* WARNING BOX */
  .warn-box {
    background: rgba(232,109,138,0.06);
    border: 1px solid rgba(232,109,138,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    margin: 10px 0;
    font-size: 0.85rem;
    color: var(--accent3);
  }
  .warn-box::before {
    content: '⚠ ';
    font-weight: 600;
  }

  /* STEP LIST */
  .step-list {
    counter-reset: steps;
    list-style: none;
    padding: 0;
    margin: 10px 0;
  }
  .step-list li {
    counter-increment: steps;
    padding: 8px 0 8px 42px;
    position: relative;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    font-size: 0.87rem;
  }
  .step-list li:last-child { border-bottom: none; }
  .step-list li::before {
    content: counter(steps);
    position: absolute;
    left: 0;
    top: 8px;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--item-color, var(--accent1));
    color: var(--item-color, var(--accent1));
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* DONE BUTTON */
  .done-btn {
    margin-top: 32px;
    padding: 12px 28px;
    background: transparent;
    border: 1px solid var(--item-color, var(--accent1));
    color: var(--item-color, var(--accent1));
    border-radius: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .done-btn:hover {
    background: var(--item-color, var(--accent1));
    color: var(--bg);
  }
  .done-btn.done-active {
    background: var(--accent4);
    border-color: var(--accent4);
    color: var(--bg);
  }

  /* SCORE INDICATOR */
  .cha-score {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 10px 0;
  }
  .cha-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 0.78rem;
    text-align: center;
    min-width: 90px;
  }
  .cha-item .cha-label {
    font-family: 'JetBrains Mono', monospace;
    color: var(--item-color, var(--accent1));
    font-size: 0.68rem;
    margin-bottom: 3px;
  }
  .cha-item .cha-val {
    color: var(--text);
    font-size: 0.82rem;
  }

  /* SIMULATION BLOCK */
  .sim-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-top: 32px;
  }
  .sim-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .sim-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--text);
  }
  .sim-timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 600;
    color: var(--accent4);
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }
  .sim-timer.warning { color: var(--accent6); }
  .sim-timer.danger { color: var(--accent3); }

  .sim-scenario-box {
    background: var(--bg3);
    border-left: 3px solid var(--item-color, var(--accent1));
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    font-size: 0.9rem;
    color: var(--text);
    font-style: italic;
    margin-bottom: 20px;
  }

  .sim-steps {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }
  .sim-step {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    opacity: 0.35;
    transition: all 0.4s ease;
    filter: blur(2px);
  }
  .sim-step.revealed {
    opacity: 1;
    filter: none;
    border-color: var(--accent4);
    background: rgba(109,232,176,0.06);
  }
  .sim-step-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    min-width: 24px;
  }
  .sim-step.revealed .sim-step-num { color: var(--accent4); }
  .sim-step-text {
    font-size: 0.87rem;
    color: var(--muted);
    flex: 1;
  }
  .sim-step.revealed .sim-step-text { color: var(--text); }
  .sim-step-check {
    font-size: 0.85rem;
    color: var(--accent4);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .sim-step.revealed .sim-step-check { opacity: 1; }

  .sim-controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .sim-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 10px 20px;
    border-radius: 6px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .sim-btn-start {
    background: var(--accent4);
    border-color: var(--accent4);
    color: var(--bg);
  }
  .sim-btn-start:hover { opacity: 0.85; }
  .sim-btn-stop {
    background: transparent;
    border-color: var(--accent3);
    color: var(--accent3);
  }
  .sim-btn-stop:hover { background: var(--accent3); color: var(--bg); }
  .sim-btn-reset {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
  }
  .sim-btn-reset:hover { border-color: var(--muted); color: var(--text); }
  .sim-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .sim-mic-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .sim-mic-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.3s;
  }
  .sim-mic-dot.active {
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: micPulse 1s infinite;
  }
  @keyframes micPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .sim-transcript {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.82rem;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    min-height: 48px;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .sim-score-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .sim-score-track {
    flex: 1;
    background: var(--border);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }
  .sim-score-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent4), var(--accent2));
    border-radius: 4px;
    transition: width 0.5s ease;
    width: 0%;
  }
  .sim-score-text {
    color: var(--accent4);
    min-width: 50px;
    text-align: right;
  }

  .sim-result {
    display: none;
    text-align: center;
    padding: 24px;
  }
  .sim-result.show { display: block; }
  .sim-result-score {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: var(--accent4);
    margin-bottom: 8px;
  }
  .sim-result-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* MOBILE */
  @media(max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; overflow-x: auto; white-space: nowrap; display: flex; padding: 12px; gap: 8px; }
    .sidebar-title { display: none; }
    .nav-item { display: inline-flex; flex-direction: column; border-left: none; border-bottom: 3px solid transparent; min-width: 120px; }
    .nav-item.active { border-left: none; border-bottom-color: var(--item-color, var(--accent1)); }
    .main { padding: 20px; }
    .site-header { flex-direction: column; align-items: flex-start; padding: 16px 20px; }
    .progress-bar-wrap { max-width: 100%; margin-left: 0; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div>
    <h1>OSKE — Tidligere Eksamensoppgaver</h1>
    <div class="sub">10 stasjoner · Medisinsk faglig sammendrag · NTNU / UiO / UiB format</div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>Gjennomgått</span>
      <span id="progress-text">0 / 10</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-title">Stasjoner</div>
    <!-- nav items injected by JS -->
  </nav>

  <main class="main" id="main-content">
    <!-- stations injected by JS -->
  </main>
</div>

<script>
const STATIONS = [
  {
    id: 1,
    color: 'var(--accent5)',
    type: 'Patologi / Hematologi',
    title: 'KLL – Kronisk Lymfatisk Leukemi',
    scenario: 'Pasient med kjent KLL. Redegjør for symptomer, behandling og prognose. Til hvilken kreftform kan sykdommen transformere seg?',
    sections: [
      {
        title: 'Sykdomsbeskrivelse',
        qas: [
          {
            q: 'Hva er KLL og hvorfor oppstår det?',
            a: `<p>KLL (Kronisk Lymfatisk Leukemi) er den vanligste leukemien hos voksne (>60 år). Karakterisert av klonal proliferasjon av modne, men funksjonelt defekte B-lymfocytter.</p>
            <p>Cellene akkumuleres i blod, benmarg, milt og lymfeknuter – men er <em>ikke</em> i stand til normal immunrespons.</p>`
          },
          {
            q: 'Hvilke symptomer gir KLL?',
            a: `<ul class="answer-list">
              <li><strong>Lymfadenopati</strong> – forstørrede, usmertelige lymfeknuter</li>
              <li><strong>Splenomegali / hepatomegali</strong> – tidlig metthetsfølelse</li>
              <li><strong>B-symptomer:</strong> nattesvette, vekttap >10%, feber</li>
              <li><strong>Anemi</strong> → tretthet, dyspné</li>
              <li><strong>Trombocytopeni</strong> → økt blødningstendens</li>
              <li><strong>Gjentatte infeksjoner</strong> → hypogammaglobulinemi</li>
              <li>Tidlig stadium: <em>oftest asymptomatisk</em> – funn ved rutinemessig blodprøve</li>
            </ul>`
          },
          {
            q: 'Hva er behandlingen av KLL?',
            a: `<p><strong>Tidlig stadium (Rai 0–II uten symptomer):</strong> Watch & wait – aktiv observasjon</p>
            <p><strong>Ved behandlingsindikasjon:</strong></p>
            <ul class="answer-list">

// ---- SIMULATION ENGINE ----
const GROQ_KEY = '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';
const simState = {};

function startSim(sid) {
  const station = STATIONS.find(s => s.id === sid);
  if (!station || !station.simulation) return;

  // Init state
  simState[sid] = {
    timeLeft: 7 * 60,
    score: 0,
    revealed: new Array(station.simulation.steps.length).fill(false),
    running: true,
    mediaRecorder: null,
    timerInterval: null,
    recordingLoop: null
  };

  document.getElementById(`sim-start-${sid}`).disabled = true;
  document.getElementById(`sim-stop-${sid}`).disabled = false;
  document.getElementById(`sim-dot-${sid}`).classList.add('active');
  document.getElementById(`sim-mic-label-${sid}`).textContent = 'Mikrofon aktiv – snakk norsk';
  document.getElementById(`sim-result-${sid}`).classList.remove('show');

  startTimer(sid);
  startRecordingLoop(sid);
}

function startTimer(sid) {
  const st = simState[sid];
  st.timerInterval = setInterval(() => {
    if (!st.running) return;
    st.timeLeft--;
    const m = Math.floor(st.timeLeft / 60);
    const s = st.timeLeft % 60;
    const disp = document.getElementById(`sim-timer-${sid}`);
    disp.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    disp.className = 'sim-timer';
    if (st.timeLeft <= 60) disp.classList.add('danger');
    else if (st.timeLeft <= 120) disp.classList.add('warning');
    if (st.timeLeft <= 0) endSim(sid);
  }, 1000);
}

async function startRecordingLoop(sid) {
  const st = simState[sid];
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const recordChunk = () => {
      if (!st.running) { stream.getTracks().forEach(t => t.stop()); return; }
      const chunks = [];
      const mr = new MediaRecorder(stream, { mimeType: 'audio/webm' });
      st.mediaRecorder = mr;
      mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mr.onstop = async () => {
        if (!st.running) return;
        const blob = new Blob(chunks, { type: 'audio/webm' });
        await transcribeAndScore(sid, blob);
        if (st.running) recordChunk();
      };
      mr.start();
      setTimeout(() => { if (mr.state === 'recording') mr.stop(); }, 4000);
    };
    recordChunk();
  } catch(e) {
    document.getElementById(`sim-mic-label-${sid}`).textContent = 'Mikrofon ikke tilgjengelig: ' + e.message;
  }
}

async function transcribeAndScore(sid, blob) {
  const station = STATIONS.find(s => s.id === sid);
  const st = simState[sid];
  if (!st || !st.running) return;

  // 1. Whisper transcription
  const formData = new FormData();
  formData.append('file', blob, 'audio.webm');
  formData.append('model', 'whisper-large-v3');
  formData.append('language', 'no');
  formData.append('response_format', 'json');

  let transcript = '';
  try {
    const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${GROQ_KEY}` },
      body: formData
    });
    const data = await res.json();
    transcript = data.text || '';
  } catch(e) { return; }

  if (!transcript.trim()) return;
  document.getElementById(`sim-transcript-${sid}`).textContent = transcript;

  // 2. AI scoring
  const unrevealedSteps = station.simulation.steps
    .map((step, i) => ({ i, label: step.label, keywords: step.keywords }))
    .filter((_, i) => !st.revealed[i]);

  if (unrevealedSteps.length === 0) return;

  const stepsText = unrevealedSteps.map(s => `${s.i}: ${s.label}`).join('\n');

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${GROQ_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 200,
        messages: [
          {
            role: 'system',
            content: `Du er sensor på en medisinsk OSKE-eksamen. Studenten utfører en klinisk prosedyre og snakker norsk. 
Din oppgave: Analyser det studenten sier og finn hvilke prosedyretrinn som er utført.
Svar KUN med JSON-array med indeksnummer for trinn som er tydelig utført. Eksempel: [0, 2]
Hvis ingenting er utført, svar: []
Vær generøs – hvis studenten nevner handlingen på en naturlig måte, godkjenn den.`
          },
          {
            role: 'user',
            content: `Studenten sa: "${transcript}"\n\nGjenværende trinn:\n${stepsText}\n\nHvilke trinn er utført? Svar kun med JSON-array.`
          }
        ]
      })
    });
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '[]';
    const clean = text.replace(/```json|```/g, '').trim();
    const matched = JSON.parse(clean);

    if (Array.isArray(matched)) {
      matched.forEach(i => {
        if (!st.revealed[i]) {
          st.revealed[i] = true;
          st.score++;
          revealStep(sid, i);
          updateScore(sid, station.simulation.steps.length);
        }
      });
    }
  } catch(e) { console.log('Scoring error:', e); }
}

function revealStep(sid, stepIdx) {
  const el = document.getElementById(`sim-step-${sid}-${stepIdx}`);
  if (el) {
    el.classList.add('revealed');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function updateScore(sid, total) {
  const st = simState[sid];
  const pct = (st.score / total) * 100;
  document.getElementById(`sim-score-fill-${sid}`).style.width = pct + '%';
  document.getElementById(`sim-score-text-${sid}`).textContent = `${st.score} / ${total}`;
}

function stopSim(sid) {
  endSim(sid);
}

function endSim(sid) {
  const station = STATIONS.find(s => s.id === sid);
  const st = simState[sid];
  if (!st) return;
  st.running = false;
  clearInterval(st.timerInterval);
  if (st.mediaRecorder && st.mediaRecorder.state === 'recording') st.mediaRecorder.stop();

  document.getElementById(`sim-start-${sid}`).disabled = false;
  document.getElementById(`sim-stop-${sid}`).disabled = true;
  document.getElementById(`sim-dot-${sid}`).classList.remove('active');
  document.getElementById(`sim-mic-label-${sid}`).textContent = 'Stasjon avsluttet';

  const result = document.getElementById(`sim-result-${sid}`);
  document.getElementById(`sim-result-score-${sid}`).textContent = `${st.score}/${station.simulation.steps.length}`;
  result.classList.add('show');
}

function resetSim(sid) {
  const station = STATIONS.find(s => s.id === sid);
  if (!station || !station.simulation) return;
  const st = simState[sid];
  if (st) { st.running = false; clearInterval(st.timerInterval); }
  delete simState[sid];

  document.getElementById(`sim-timer-${sid}`).textContent = '07:00';
  document.getElementById(`sim-timer-${sid}`).className = 'sim-timer';
  document.getElementById(`sim-start-${sid}`).disabled = false;
  document.getElementById(`sim-stop-${sid}`).disabled = true;
  document.getElementById(`sim-dot-${sid}`).classList.remove('active');
  document.getElementById(`sim-mic-label-${sid}`).textContent = 'Trykk Start for å begynne';
  document.getElementById(`sim-transcript-${sid}`).textContent = '—';
  document.getElementById(`sim-score-fill-${sid}`).style.width = '0%';
  document.getElementById(`sim-score-text-${sid}`).textContent = `0 / ${station.simulation.steps.length}`;
  document.getElementById(`sim-result-${sid}`).classList.remove('show');
  station.simulation.steps.forEach((_, i) => {
    const el = document.getElementById(`sim-step-${sid}-${i}`);
    if (el) el.classList.remove('revealed');
  });
}

// ---- UTILITY ----
function selectStation(idx) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.station').forEach(s => s.classList.remove('active'));
  document.querySelector(`.nav-item[data-idx="${idx}"]`).classList.add('active');
  document.querySelector(`.station[data-idx="${idx}"]`).classList.add('active');
  window.scrollTo(0, 0);
}

function toggleQA(el) {
  const answer = el.nextElementSibling;
  const toggle = el.querySelector('.qa-toggle');
  answer.classList.toggle('open');
  toggle.classList.toggle('open');
}

function markDone(idx) {
  doneSet.add(idx);
  const btn = document.querySelector(`.station[data-idx="${idx}"] .done-btn`);
  btn.textContent = '✓ Gjennomgått';
  btn.classList.add('done-active');
  document.querySelector(`.nav-item[data-idx="${idx}"]`).classList.add('done');
  updateProgress();
}

function updateProgress() {
  const pct = (doneSet.size / STATIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${doneSet.size} / ${STATIONS.length}`;
}
</script>
