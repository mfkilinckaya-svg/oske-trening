<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSKE Treningsprogram</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060d1a; --surface: #0d1b2e; --panel: #112236;
    --border: #1a3050; --borderL: #1e3a5f;
    --accent: #2d7dd2; --success: #0fa87e; --warning: #e8a020; --danger: #d94f4f;
    --text: #dce8f5; --muted: #5a7a99; --dim: #3a5878; --highlight: #0d2a4a;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
  button { cursor: pointer; font-family: var(--sans); border: none; transition: opacity 0.15s, background 0.15s; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  textarea, input { font-family: var(--sans); color: var(--text); outline: none; }
  .screen { display: none; } .screen.active { display: block; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .btn { border-radius: 6px; font-weight: 600; padding: 10px 20px; font-size: 14px; letter-spacing: 0.01em; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border) !important; }
  .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent) !important; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .score-bar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .pulse { animation: pulse 1s infinite; }
  .divider { height: 1px; background: var(--border); flex: 1; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ═══ SCREEN: MENU ═══════════════════════════════════════════════════════ -->
<div id="screen-menu" class="screen active">
  <div style="max-width:700px;margin:0 auto;padding:40px 20px">
    <div style="text-align:center;margin-bottom:48px">
      <div style="font-family:var(--mono);color:var(--dim);font-size:11px;letter-spacing:.2em;margin-bottom:12px">NORSK MEDISINSK UTDANNING</div>
      <h1 style="font-size:30px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px">OSKE Treningsprogram</h1>
      <p style="color:var(--muted);font-family:var(--mono);font-size:13px">Velg en stasjon og tren med AI-pasient 🎙️</p>
    </div>

    <div style="margin-bottom:32px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <span style="font-family:var(--mono);color:var(--dim);font-size:11px;letter-spacing:.15em">SKULDER</span>
        <div class="divider"></div>
      </div>
      <div id="station-list" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>
  </div>
</div>

<!-- ═══ SCREEN: BRIEFING ══════════════════════════════════════════════════ -->
<div id="screen-briefing" class="screen">
  <div style="max-width:700px;margin:0 auto;padding:32px 20px">
    <button class="btn btn-ghost btn-sm" onclick="showMenu()" style="margin-bottom:24px">← Tilbake</button>
    <div id="briefing-chip" style="margin-bottom:8px"></div>
    <h1 id="briefing-title" style="font-size:22px;font-weight:700;letter-spacing:-.01em;margin:8px 0 24px"></h1>
    <div class="panel" style="margin-bottom:16px;border-left:3px solid var(--accent)">
      <div style="font-family:var(--mono);color:var(--muted);font-size:11px;letter-spacing:.1em;margin-bottom:10px">SCENARIO</div>
      <p id="briefing-scenario" style="font-size:15px;line-height:1.7"></p>
    </div>
    <div class="panel" style="margin-bottom:16px">
      <div style="font-family:var(--mono);color:var(--muted);font-size:11px;letter-spacing:.1em;margin-bottom:10px">OPPGAVER</div>
      <div id="briefing-tasks" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>
    <div style="display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap">
      <div class="panel" style="flex:1;min-width:110px;text-align:center;padding:14px 16px">
        <div id="b-time" style="color:var(--accent);font-family:var(--mono);font-size:22px;font-weight:700"></div>
        <div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px">minutter</div>
      </div>
      <div class="panel" style="flex:1;min-width:110px;text-align:center;padding:14px 16px">
        <div id="b-max" style="color:var(--success);font-family:var(--mono);font-size:22px;font-weight:700"></div>
        <div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px">maks poeng</div>
      </div>
      <div class="panel" style="flex:1;min-width:110px;text-align:center;padding:14px 16px">
        <div id="b-pass" style="color:var(--warning);font-family:var(--mono);font-size:22px;font-weight:700"></div>
        <div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px">bestått (65%)</div>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="startPractice()">Start øvelse →</button>
  </div>
</div>

<!-- ═══ SCREEN: PRACTICE ═════════════════════════════════════════════════ -->
<div id="screen-practice" class="screen" style="height:100vh;display:none;flex-direction:column">
  <!-- Top bar -->
  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>
      <div id="p-title" style="font-weight:600;font-size:14px"></div>
      <div id="p-patient" style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div id="timer" style="background:var(--panel);border:1px solid var(--success);border-radius:8px;padding:6px 14px;font-family:var(--mono);font-size:18px;font-weight:700;color:var(--success);min-width:70px;text-align:center">7:00</div>
      <button class="btn btn-ghost btn-sm" onclick="toggleHint()">💡 Hint</button>
      <button class="btn btn-success btn-sm" onclick="finishPractice()">Avslutt →</button>
    </div>
  </div>
  <!-- Hint -->
  <div id="hint-bar" style="display:none;background:var(--highlight);border-bottom:1px solid rgba(45,125,210,.2);padding:10px 20px">
    <div style="font-family:var(--mono);color:var(--muted);font-size:11px;margin-bottom:4px">OPPGAVER</div>
    <div id="hint-tasks" style="display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:12px;color:var(--text)"></div>
  </div>
  <!-- Chat -->
  <div id="chat" style="flex:1;overflow-y:auto;padding:20px 20px 12px">
    <div id="chat-inner" style="max-width:660px;margin:0 auto;display:flex;flex-direction:column;gap:16px"></div>
  </div>
  <!-- Input -->
  <div style="background:var(--surface);border-top:1px solid var(--border);padding:14px 20px">
    <div style="max-width:660px;margin:0 auto">
      <div id="rec-indicator" style="display:none;align-items:center;gap:8px;margin-bottom:8px;padding:6px 12px;border-radius:6px">
        <div id="rec-dot" style="width:8px;height:8px;border-radius:50%" class="pulse"></div>
        <span id="rec-text" style="font-family:var(--mono);font-size:11px;letter-spacing:.05em"></span>
      </div>
      <div style="display:flex;gap:10px">
        <textarea id="msg-input" rows="2" placeholder="Snakk eller skriv til pasienten..."
          style="flex:1;background:var(--panel);border:1px solid var(--borderL);border-radius:8px;padding:10px 14px;font-size:14px;resize:none;line-height:1.5"
          onkeydown="handleKey(event)"></textarea>
        <div style="display:flex;flex-direction:column;gap:8px;justify-content:flex-end">
          <button id="mic-btn" onclick="toggleRecording()"
            style="width:40px;height:40px;border-radius:8px;border:1px solid var(--border);background:var(--panel);font-size:18px;display:flex;align-items:center;justify-content:center">🎙️</button>
          <button class="btn btn-primary" onclick="sendMessage()" id="send-btn">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ SCREEN: SCORING ══════════════════════════════════════════════════ -->
<div id="screen-scoring" class="screen">
  <div style="max-width:700px;margin:0 auto;padding:32px 20px">
    <button class="btn btn-ghost btn-sm" onclick="showPractice()" style="margin-bottom:24px">← Samtalen</button>
    <div id="score-header" class="panel" style="margin-bottom:20px;text-align:center;padding:28px 24px"></div>
    <div id="score-feedback" style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap"></div>
    <div id="score-general" style="margin-bottom:20px"></div>
    <div id="score-detail" class="panel" style="margin-bottom:24px"></div>
    <div id="score-toggle" style="text-align:center;margin-bottom:20px"></div>
    <div style="display:flex;gap:12px;justify-content:center">
      <button class="btn btn-outline" onclick="showPractice()">Se samtalen igjen</button>
      <button class="btn btn-primary" onclick="showMenu()">Ny stasjon</button>
    </div>
  </div>
</div>

<script>

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let currentStation = null;
let chatHistory = [];
let timerInterval = null;
let timeLeft = 0;
let isRecording = false;
let isTranscribing = false;
let mediaRecorder = null;
let audioChunks = [];
let evalResult = null;
let manualMode = false;
let manualScores = {};

// ═══════════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const el = document.getElementById('screen-' + id);
  if (id === 'practice') {
    el.style.display = 'flex';
  } else {
    el.style.display = 'block';
  }
  el.classList.add('active');
}

function showMenu() {
  stopTimer();
  showScreen('menu');
}
function showPractice() { showScreen('practice'); }

// ═══════════════════════════════════════════════════════════════════════
// MENU
// ═══════════════════════════════════════════════════════════════════════
function renderMenu() {
  const list = document.getElementById('station-list');
  list.innerHTML = STATIONS.map(s => `
    <div onclick="selectStation('${s.id}')"
      style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:border-color 0.15s"
      onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      <div>
        <div style="font-weight:600;font-size:15px">${s.stationName}</div>
        <div style="color:var(--muted);font-family:var(--mono);font-size:12px;margin-top:4px">${s.patientInfo.age} år · ${s.patientInfo.gender} · ${s.patientInfo.complaint}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-shrink:0">
        <div style="text-align:right">
          <div style="color:var(--success);font-family:var(--mono);font-size:14px;font-weight:700">${s.totalMaxPoints}p</div>
          <div style="color:var(--dim);font-family:var(--mono);font-size:10px">${s.timeMinutes} min</div>
        </div>
        <span style="color:var(--muted);font-size:18px">→</span>
      </div>
    </div>
  `).join('');
}

function selectStation(id) {
  currentStation = STATIONS.find(s => s.id === id);
  renderBriefing();
  showScreen('briefing');
}

// ═══════════════════════════════════════════════════════════════════════
// BRIEFING
// ═══════════════════════════════════════════════════════════════════════
function renderBriefing() {
  const s = currentStation;
  document.getElementById('briefing-chip').innerHTML = `<span style="background:var(--accent)18;color:var(--accent);border:1px solid var(--accent)30;border-radius:3px;padding:1px 7px;font-size:10px;font-family:var(--mono);font-weight:700;letter-spacing:.08em;text-transform:uppercase">Klinisk stasjon</span>`;
  document.getElementById('briefing-title').textContent = s.stationName;
  document.getElementById('briefing-scenario').textContent = s.scenario;
  document.getElementById('briefing-tasks').innerHTML = s.tasks.map(t => `<div style="font-size:14px;line-height:1.5">${t}</div>`).join('');
  document.getElementById('b-time').textContent = s.timeMinutes;
  document.getElementById('b-max').textContent = s.totalMaxPoints;
  document.getElementById('b-pass').textContent = s.passingScore;
}

// ═══════════════════════════════════════════════════════════════════════
// PRACTICE
// ═══════════════════════════════════════════════════════════════════════
function startPractice() {
  chatHistory = [];
  evalResult = null;
  manualMode = false;
  manualScores = {};
  document.getElementById('chat-inner').innerHTML = '';
  document.getElementById('msg-input').value = '';

  const s = currentStation;
  document.getElementById('p-title').textContent = s.stationName;
  document.getElementById('p-patient').textContent = `Pasient: ${s.patientInfo.name}, ${s.patientInfo.age} år`;
  document.getElementById('hint-tasks').innerHTML = s.tasks.map(t => `<span>${t}</span>`).join('');

  showScreen('practice');
  startTimer();

  // Opening patient message
  const opener = `*Pasienten sitter og virker ukomfortabel*\n\nHei... jeg er glad du kan se meg. Det gjør ganske vondt, og jeg er litt bekymret.`;
  addMessage('assistant', opener);
  chatHistory.push({ role: 'assistant', content: opener });
}

function startTimer() {
  stopTimer();
  timeLeft = currentStation.timeMinutes * 60;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) stopTimer();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60);
  const s = String(timeLeft % 60).padStart(2, '0');
  const el = document.getElementById('timer');
  el.textContent = `${m}:${s}`;
  const color = timeLeft < 60 ? 'var(--danger)' : timeLeft < 120 ? 'var(--warning)' : 'var(--success)';
  el.style.color = color;
  el.style.borderColor = color + '60';
}

function toggleHint() {
  const bar = document.getElementById('hint-bar');
  bar.style.display = bar.style.display === 'none' ? 'block' : 'none';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  setSendDisabled(true);

  addMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  // Typing indicator
  const typingId = addTyping();

  try {
    const systemPrompt = buildPatientPrompt();
    const reply = await callClaude(systemPrompt, chatHistory);
    removeTyping(typingId);
    addMessage('assistant', reply);
    chatHistory.push({ role: 'assistant', content: reply });
  } catch(e) {
    removeTyping(typingId);
    addMessage('assistant', '*[Noe gikk galt — prøv igjen]*');
  } finally {
    setSendDisabled(false);
  }
}

function setSendDisabled(v) {
  document.getElementById('send-btn').disabled = v;
}

function addMessage(role, content) {
  const inner = document.getElementById('chat-inner');
  const div = document.createElement('div');
  div.style.cssText = `display:flex;justify-content:${role==='user'?'flex-end':'flex-start'}`;
  
  const avatar = role === 'assistant' ? `<div style="width:32px;height:32px;border-radius:50%;background:var(--highlight);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;margin-right:8px;flex-shrink:0;margin-top:2px">🤒</div>` : '';
  
  div.innerHTML = `${avatar}<div style="max-width:75%;background:${role==='user'?'var(--accent)':'var(--panel)'};color:var(--text);padding:10px 14px;border-radius:${role==='user'?'12px 12px 4px 12px':'12px 12px 12px 4px'};border:1px solid ${role==='user'?'rgba(45,125,210,.6)':'var(--border)'};font-size:14px;line-height:1.6;white-space:pre-wrap">${escHtml(content)}</div>`;
  
  inner.appendChild(div);
  document.getElementById('chat').scrollTop = 99999;
  return div;
}

function addTyping() {
  const id = 'typing-' + Date.now();
  const inner = document.getElementById('chat-inner');
  inner.insertAdjacentHTML('beforeend', `<div id="${id}" style="display:flex;align-items:center;gap:8px"><div style="width:32px;height:32px;border-radius:50%;background:var(--highlight);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px">🤒</div><div style="color:var(--muted);font-family:var(--mono);font-size:13px">Pasienten tenker...</div></div>`);
  document.getElementById('chat').scrollTop = 99999;
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function finishPractice() {
  stopTimer();
  showScreen('scoring');
  await evaluatePerformance();
}

// ═══════════════════════════════════════════════════════════════════════
// RECORDING (Groq Whisper)
// ═══════════════════════════════════════════════════════════════════════
async function toggleRecording() {
  if (isTranscribing) return;

  if (isRecording) {
    mediaRecorder?.stop();
    setRecordingUI(false);
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4']
      .find(m => MediaRecorder.isTypeSupported(m)) || '';
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    audioChunks = [];

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      setTranscribingUI(true);
      try {
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        const ext = (mediaRecorder.mimeType||'').includes('mp4') ? 'mp4' : (mediaRecorder.mimeType||'').includes('ogg') ? 'ogg' : 'webm';
        const fd = new FormData();
        fd.append('file', blob, `rec.${ext}`);
        fd.append('model', 'whisper-large-v3');
        fd.append('language', 'no');
        fd.append('response_format', 'text');

        const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
          method: 'POST',
          headers: { Authorization: `Bearer ${GROQ_KEY}` },
          body: fd
        });
        const text = await res.text();
        if (text?.trim()) {
          const inp = document.getElementById('msg-input');
          inp.value = inp.value ? inp.value + ' ' + text.trim() : text.trim();
        }
      } catch(e) {
        console.error('Groq error:', e);
        alert('Transkripsjon feilet. Sjekk internettforbindelsen.');
      } finally {
        setTranscribingUI(false);
      }
    };

    mediaRecorder.start();
    setRecordingUI(true);
  } catch(e) {
    alert('Mikrofon tilgang ble nektet. Tillat mikrofon i nettleserinnstillingene.');
  }
}

function setRecordingUI(active) {
  isRecording = active;
  const btn = document.getElementById('mic-btn');
  const ind = document.getElementById('rec-indicator');
  const dot = document.getElementById('rec-dot');
  const txt = document.getElementById('rec-text');
  const inp = document.getElementById('msg-input');

  btn.textContent = active ? '⏹️' : '🎙️';
  btn.style.borderColor = active ? 'var(--danger)' : 'var(--border)';
  btn.style.background = active ? 'rgba(217,79,79,.2)' : 'var(--panel)';
  ind.style.display = active ? 'flex' : 'none';
  if (active) {
    ind.style.background = 'rgba(217,79,79,.1)';
    ind.style.border = '1px solid rgba(217,79,79,.3)';
    dot.style.background = 'var(--danger)';
    txt.style.color = 'var(--danger)';
    txt.textContent = 'TAR OPP... (trykk igjen for å stoppe)';
    inp.placeholder = 'Snakker du nå... 🎙️';
  } else {
    inp.placeholder = 'Snakk eller skriv til pasienten...';
  }
}

function setTranscribingUI(active) {
  isTranscribing = active;
  const btn = document.getElementById('mic-btn');
  const ind = document.getElementById('rec-indicator');
  const dot = document.getElementById('rec-dot');
  const txt = document.getElementById('rec-text');

  btn.textContent = active ? '⏳' : '🎙️';
  btn.disabled = active;
  ind.style.display = active ? 'flex' : 'none';
  if (active) {
    ind.style.background = 'rgba(45,125,210,.1)';
    ind.style.border = '1px solid rgba(45,125,210,.3)';
    dot.style.background = 'var(--accent)';
    txt.style.color = 'var(--accent)';
    txt.textContent = 'TRANSKRIBERER...';
  }
}

// ═══════════════════════════════════════════════════════════════════════
// AI CALLS
// ═══════════════════════════════════════════════════════════════════════
async function callClaude(system, messages) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system,
      messages,
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

function buildPatientPrompt() {
  const s = currentStation;
  const p = s.patientInfo;
  return `Du er en skuespillerpasient i en norsk OSKE-eksamen. Spill rollen som pasient HELE tiden.

PASIENT:
- Navn: ${p.name}
- Alder: ${p.age} år
- Kjønn: ${p.gender}
- Hovedplage: ${p.complaint}

SCENARIE (kun for din forståelse):
${s.scenario}

OPPGAVER studenten skal utføre: ${s.tasks.join(', ')}

REGLER:
1. Svar KUN som pasient – aldri bryt rollen
2. Svar på norsk bokmål
3. Vis realistiske emosjoner (engstelse, smerte, forvirring)
4. Avslør KUN informasjon hvis studenten spør direkte
5. Hold svar korte (2-4 setninger)
6. Hvis studenten gjør en klinisk undersøkelse, beskriv hvordan det føles
7. Si "vet ikke" hvis du ikke vet noe som pasient
8. IKKE gi medisinske råd eller diagnoser`;
}

// ═══════════════════════════════════════════════════════════════════════
// SCORING
// ═══════════════════════════════════════════════════════════════════════
async function evaluatePerformance() {
  const s = currentStation;
  const conversation = chatHistory.map(m => `${m.role === 'user' ? 'STUDENT' : 'PASIENT'}: ${m.content}`).join('\n\n');

  const prompt = `Du er en OSKE-eksaminator.

SCORINGSKRITERIER:
${s.scoringCriteria.map((c,i) => `${i+1}. [${c.category}] ${c.description} — maks ${c.maxPoints} poeng. Hint: ${c.hint}`).join('\n')}

SAMTALE:
${conversation}

OPPGAVER: ${s.tasks.join('; ')}

Vurder hvert kriterium. Svar KUN med gyldig JSON:
{"scores":[{"id":1,"points":1,"maxPoints":2,"category":"...","description":"...","feedback":"..."}],"totalScore":0,"maxTotal":0,"percentage":0,"passed":false,"generalFeedback":"...","strengths":["..."],"improvements":["..."]}`;

  document.getElementById('score-header').innerHTML = `<div style="font-size:36px;margin-bottom:8px">⏳</div><div style="font-family:var(--mono);font-size:16px;color:var(--muted)">Vurderer prestasjon...</div>`;

  try {
    const raw = await callClaude('Du er en OSKE-eksaminator. Svar kun med gyldig JSON.', [{ role: 'user', content: prompt }]);
    const clean = raw.replace(/```json|```/g, '').trim();
    evalResult = JSON.parse(clean);
    renderScoring(false);
  } catch(e) {
    manualMode = true;
    renderScoring(true);
  }
}

function renderScoring(manual) {
  const s = currentStation;
  const scores = evalResult?.scores || [];
  const total = manual ? calcManualTotal() : (evalResult?.totalScore ?? 0);
  const maxTotal = s.totalMaxPoints;
  const pct = manual ? calcManualPct() : (evalResult?.percentage ?? 0);
  const passed = pct >= 65;

  // Header
  const barColor = pct >= 65 ? 'var(--success)' : pct >= 40 ? 'var(--warning)' : 'var(--danger)';
  document.getElementById('score-header').innerHTML = `
    <div style="border-left:3px solid ${passed?'var(--success)':'var(--danger)'};padding-left:16px">
      <div style="font-size:40px;margin-bottom:8px">${passed?'✅':'📚'}</div>
      <div style="font-family:var(--mono);font-size:32px;font-weight:700;color:${passed?'var(--success)':'var(--danger)'}">${total} / ${maxTotal}</div>
      <div style="color:var(--muted);font-family:var(--mono);font-size:13px;margin-top:4px">${pct}% — ${passed?'BESTÅTT':'IKKE BESTÅTT'} (grense: 65%)</div>
      <div style="margin-top:16px;max-width:400px;margin:16px auto 0">
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>
    </div>`;

  // Strengths / improvements
  let feedbackHtml = '';
  if (evalResult?.strengths?.length) {
    feedbackHtml += `<div class="panel" style="flex:1;min-width:200px;border-left:3px solid var(--success)"><div style="color:var(--success);font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-bottom:10px">STYRKER</div>${evalResult.strengths.map(s=>`<div style="font-size:13px;margin-bottom:4px">✓ ${escHtml(s)}</div>`).join('')}</div>`;
  }
  if (evalResult?.improvements?.length) {
    feedbackHtml += `<div class="panel" style="flex:1;min-width:200px;border-left:3px solid var(--warning)"><div style="color:var(--warning);font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-bottom:10px">FORBEDRINGSOMRÅDER</div>${evalResult.improvements.map(s=>`<div style="font-size:13px;margin-bottom:4px">→ ${escHtml(s)}</div>`).join('')}</div>`;
  }
  document.getElementById('score-feedback').style.cssText = 'display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap';
  document.getElementById('score-feedback').innerHTML = feedbackHtml;

  // General
  if (evalResult?.generalFeedback) {
    document.getElementById('score-general').innerHTML = `<div class="panel" style="margin-bottom:20px;border-left:3px solid var(--accent)"><div style="color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-bottom:8px">GENERELL TILBAKEMELDING</div><p style="font-size:14px;line-height:1.6">${escHtml(evalResult.generalFeedback)}</p></div>`;
  }

  // Detailed scores
  const cats = {};
  const items = scores.length > 0 ? scores : s.scoringCriteria;
  items.forEach(item => {
    const cat = item.category || 'Annet';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(item);
  });

  let detailHtml = `<div style="font-family:var(--mono);color:var(--muted);font-size:11px;letter-spacing:.1em;margin-bottom:16px">DETALJERT SKÅRING</div>`;
  for (const [cat, items] of Object.entries(cats)) {
    detailHtml += `<div style="margin-bottom:20px"><div style="color:var(--accent);font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)">${cat.toUpperCase()}</div>`;
    for (const item of items) {
      const got = manual ? (manualScores[item.id] ?? 0) : (item.points ?? 0);
      const max = item.maxPoints;
      const sc = got >= max ? 'var(--success)' : got > 0 ? 'var(--warning)' : 'var(--danger)';
      detailHtml += `
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:4px">
            <span style="font-size:13px;line-height:1.4;flex:1">${escHtml(item.description)}</span>
            ${manual
              ? `<div style="display:flex;align-items:center;gap:6px"><input type="number" min="0" max="${max}" value="${manualScores[item.id]??0}" onchange="updateManual(${item.id},this.value,${max})" style="width:44px;background:var(--panel);border:1px solid var(--borderL);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:13px;padding:3px 6px;text-align:center"><span style="color:var(--muted);font-family:var(--mono);font-size:12px">/${max}</span></div>`
              : `<span style="color:${sc};font-family:var(--mono);font-size:13px;font-weight:700;min-width:40px;text-align:right">${got}/${max}</span>`
            }
          </div>
          <div class="score-bar-track"><div class="score-bar-fill" style="width:${max>0?Math.round(got/max*100):0}%;background:${sc}"></div></div>
          ${item.feedback ? `<div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:4px;font-style:italic">${escHtml(item.feedback)}</div>` : ''}
        </div>`;
    }
    detailHtml += '</div>';
  }
  if (manual) {
    detailHtml += `<div id="manual-total" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600">Total</span><span style="font-family:var(--mono);font-size:16px;font-weight:700;color:${calcManualPct()>=65?'var(--success)':'var(--danger)'}">${calcManualTotal()}/${maxTotal} (${calcManualPct()}%)</span></div>`;
  }
  document.getElementById('score-detail').innerHTML = detailHtml;

  // Toggle
  if (evalResult) {
    document.getElementById('score-toggle').innerHTML = `<button class="btn btn-ghost btn-sm" onclick="toggleScoreMode()">${manual?'Vis AI-skåring':'Endre til manuell skåring'}</button>`;
  }
}

function updateManual(id, val, max) {
  manualScores[id] = Math.min(max, Math.max(0, parseInt(val)||0));
  renderScoring(true);
}

function calcManualTotal() {
  return Object.values(manualScores).reduce((a,b)=>a+b,0);
}

function calcManualPct() {
  const max = currentStation.totalMaxPoints;
  return max > 0 ? Math.round(calcManualTotal()/max*100) : 0;
}

function toggleScoreMode() {
  manualMode = !manualMode;
  renderScoring(manualMode);
}
