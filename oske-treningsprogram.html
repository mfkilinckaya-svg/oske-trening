<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSKE Treningsprogram</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#060d1a;--surface:#0d1b2e;--panel:#112236;
    --border:#1a3050;--borderL:#1e3a5f;
    --accent:#2d7dd2;--success:#0fa87e;--warning:#e8a020;--danger:#d94f4f;
    --text:#dce8f5;--muted:#5a7a99;--dim:#3a5878;--hl:#0d2a4a;
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  }
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  button{cursor:pointer;font-family:var(--sans);border:none;transition:all 0.15s}
  button:disabled{opacity:0.4;cursor:not-allowed}
  textarea,input{font-family:var(--sans);color:var(--text);outline:none}
  .screen{display:none}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
  .btn{border-radius:6px;font-weight:600;padding:10px 20px;font-size:14px}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-success{background:var(--success);color:#fff}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}
  .btn-sm{padding:6px 14px;font-size:13px}
  .bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .pulse{animation:pulse 1s infinite}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn 0.3s ease}
  @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- ══ MENU ══════════════════════════════════════════════════════════════ -->
<div id="s-menu" class="screen" style="max-width:700px;margin:0 auto;padding:40px 20px">
  <div style="text-align:center;margin-bottom:48px">
    <div style="font-family:var(--mono);color:var(--dim);font-size:11px;letter-spacing:.2em;margin-bottom:12px">NORSK MEDISINSK UTDANNING</div>
    <h1 style="font-size:30px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px">OSKE Treningsprogram</h1>
    <p style="color:var(--muted);font-family:var(--mono);font-size:13px">Velg en stasjon og tren med AI-pasient 🎙️</p>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <span style="font-family:var(--mono);color:var(--dim);font-size:11px;letter-spacing:.15em">SKULDER</span>
    <div style="height:1px;background:var(--border);flex:1"></div>
  </div>
  <div id="station-list" style="display:flex;flex-direction:column;gap:10px"></div>
</div>

<!-- ══ BRIEFING ══════════════════════════════════════════════════════════ -->
<div id="s-briefing" class="screen" style="max-width:700px;margin:0 auto;padding:32px 20px">
  <button class="btn btn-ghost btn-sm" onclick="go('menu')" style="margin-bottom:24px">← Tilbake</button>
  <div id="b-chip" style="margin-bottom:8px"></div>
  <h1 id="b-title" style="font-size:22px;font-weight:700;margin:8px 0 24px"></h1>
  <div class="panel" style="margin-bottom:16px;border-left:3px solid var(--accent)">
    <div style="font-family:var(--mono);color:var(--muted);font-size:11px;letter-spacing:.1em;margin-bottom:10px">SCENARIO</div>
    <p id="b-scenario" style="font-size:15px;line-height:1.7"></p>
  </div>
  <div class="panel" style="margin-bottom:16px">
    <div style="font-family:var(--mono);color:var(--muted);font-size:11px;letter-spacing:.1em;margin-bottom:10px">OPPGAVER</div>
    <div id="b-tasks" style="display:flex;flex-direction:column;gap:8px;font-size:14px;line-height:1.5"></div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap">
    <div class="panel" style="flex:1;min-width:100px;text-align:center;padding:14px">
      <div id="b-time" style="color:var(--accent);font-family:var(--mono);font-size:22px;font-weight:700"></div>
      <div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px">minutter</div>
    </div>
    <div class="panel" style="flex:1;min-width:100px;text-align:center;padding:14px">
      <div id="b-max" style="color:var(--success);font-family:var(--mono);font-size:22px;font-weight:700"></div>
      <div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px">maks poeng</div>
    </div>
    <div class="panel" style="flex:1;min-width:100px;text-align:center;padding:14px">
      <div id="b-pass" style="color:var(--warning);font-family:var(--mono);font-size:22px;font-weight:700"></div>
      <div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px">bestått (65%)</div>
    </div>
  </div>
  <button class="btn btn-primary" style="width:100%" onclick="startPractice()">Start øvelse →</button>
</div>

<!-- ══ PRACTICE ═══════════════════════════════════════════════════════════ -->
<div id="s-practice" class="screen" style="height:100vh;flex-direction:column">
  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>
      <div id="p-title" style="font-weight:600;font-size:14px"></div>
      <div id="p-patient" style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:1px"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="timer" style="background:var(--panel);border:1px solid var(--success);border-radius:8px;padding:5px 12px;font-family:var(--mono);font-size:17px;font-weight:700;color:var(--success);min-width:65px;text-align:center">7:00</div>
      <button class="btn btn-ghost btn-sm" onclick="toggleHint()">💡 Hint</button>
      <button class="btn btn-success btn-sm" onclick="finishExam()">Avslutt →</button>
    </div>
  </div>
  <div id="hint-bar" style="display:none;background:var(--hl);border-bottom:1px solid rgba(45,125,210,.2);padding:8px 20px">
    <div style="font-family:var(--mono);color:var(--muted);font-size:11px;margin-bottom:4px">OPPGAVER</div>
    <div id="hint-tasks" style="font-family:var(--mono);font-size:12px;color:var(--text);display:flex;flex-wrap:wrap;gap:12px"></div>
  </div>
  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;align-items:center;gap:12px">
    <span style="font-family:var(--mono);color:var(--muted);font-size:11px;white-space:nowrap">POENG</span>
    <div class="bar-track" style="flex:1"><div id="live-bar" class="bar-fill" style="width:0%;background:var(--success)"></div></div>
    <span id="live-score" style="font-family:var(--mono);font-size:12px;color:var(--success);min-width:50px;text-align:right">0 / 0</span>
  </div>
  <div id="chat" style="flex:1;overflow-y:auto;padding:16px 20px 8px">
    <div id="chat-inner" style="max-width:660px;margin:0 auto;display:flex;flex-direction:column;gap:14px"></div>
  </div>
  <div style="background:var(--surface);border-top:1px solid var(--border);padding:12px 20px">
    <div style="max-width:660px;margin:0 auto">
      <div id="rec-ind" style="display:none;align-items:center;gap:8px;margin-bottom:8px;padding:5px 10px;border-radius:6px">
        <div id="rec-dot" style="width:8px;height:8px;border-radius:50%" class="pulse"></div>
        <span id="rec-txt" style="font-family:var(--mono);font-size:11px;letter-spacing:.05em"></span>
      </div>
      <div style="display:flex;gap:8px">
        <textarea id="msg-input" rows="2" placeholder="Snakk eller skriv til pasienten..."
          style="flex:1;background:var(--panel);border:1px solid var(--borderL);border-radius:8px;padding:10px 14px;font-size:14px;resize:none;line-height:1.5"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <div style="display:flex;flex-direction:column;gap:6px;justify-content:flex-end">
          <button id="mic-btn" onclick="toggleRec()" style="width:40px;height:40px;border-radius:8px;border:1px solid var(--border);background:var(--panel);font-size:17px;display:flex;align-items:center;justify-content:center">🎙️</button>
          <button class="btn btn-primary btn-sm" onclick="sendMsg()" id="send-btn">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ SENSOR ═════════════════════════════════════════════════════════════ -->
<div id="s-sensor" class="screen" style="max-width:700px;margin:0 auto;padding:32px 20px">
  <div style="text-align:center;margin-bottom:24px">
    <div style="font-size:32px;margin-bottom:8px">🎓</div>
    <h2 style="font-size:20px;font-weight:700">Sensørspørsmål</h2>
    <p style="color:var(--muted);font-family:var(--mono);font-size:12px;margin-top:4px">Muayene bitti — nå stiller sensor deg spørsmål</p>
  </div>
  <div class="panel" style="margin-bottom:20px;border-left:3px solid var(--warning)">
    <div style="font-family:var(--mono);color:var(--warning);font-size:11px;letter-spacing:.1em;margin-bottom:10px">SENSOR SPØR</div>
    <p id="sensor-question" style="font-size:15px;line-height:1.7"></p>
  </div>
  <div id="sensor-rec-ind" style="display:none;align-items:center;gap:8px;margin-bottom:8px;padding:5px 10px;border-radius:6px">
    <div id="sensor-rec-dot" style="width:8px;height:8px;border-radius:50%" class="pulse"></div>
    <span id="sensor-rec-txt" style="font-family:var(--mono);font-size:11px;letter-spacing:.05em"></span>
  </div>
  <textarea id="sensor-input" rows="4" placeholder="Skriv eller snakk svaret ditt..."
    style="width:100%;background:var(--panel);border:1px solid var(--borderL);border-radius:8px;padding:12px 14px;font-size:14px;resize:none;line-height:1.6;margin-bottom:12px"></textarea>
  <div style="display:flex;gap:10px;margin-bottom:16px">
    <button id="sensor-mic-btn" onclick="toggleSensorRec()" style="width:40px;height:40px;border-radius:8px;border:1px solid var(--border);background:var(--panel);font-size:17px;display:flex;align-items:center;justify-content:center">🎙️</button>
    <button class="btn btn-primary" style="flex:1" onclick="submitSensorAnswer()" id="sensor-submit-btn">Svar →</button>
  </div>
  <div style="text-align:center">
    <span id="sensor-progress" style="font-family:var(--mono);color:var(--muted);font-size:12px"></span>
  </div>
</div>

<!-- ══ SCORING ════════════════════════════════════════════════════════════ -->
<div id="s-scoring" class="screen" style="max-width:700px;margin:0 auto;padding:32px 20px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px">
    <button class="btn btn-ghost btn-sm" onclick="go('practice')">← Samtalen</button>
    <div id="score-countdown" style="font-family:var(--mono);font-size:13px;color:var(--muted)"></div>
  </div>
  <div id="score-header" class="panel" style="margin-bottom:20px;text-align:center;padding:28px 24px"></div>
  <div id="score-sensor-answers" style="margin-bottom:20px"></div>
  <div id="score-detail" class="panel" style="margin-bottom:24px"></div>
  <div style="display:flex;gap:12px;justify-content:center">
    <button class="btn btn-outline" onclick="go('practice')">Se samtalen</button>
    <button class="btn btn-primary" onclick="go('menu')">Ny stasjon</button>
  </div>
</div>

// STATE
let station=null,chatHistory=[],scores={},timerInterval=null,timeLeft=0;

// NAV
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  const el=document.getElementById('s-'+id);
  el.style.display=id==='practice'?'flex':'block';
  if(id==='practice') el.style.flexDirection='column';
}

// MENU
function renderMenu(){
  document.getElementById('station-list').innerHTML=STATIONS.map(s=>`
    <div onclick="selectStation('${s.id}')"
      style="background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:border-color .15s"
      onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      <div>
        <div style="font-weight:600;font-size:15px">${s.stationName}</div>
        <div style="color:var(--muted);font-family:var(--mono);font-size:12px;margin-top:4px">${s.patientInfo.age} år · ${s.patientInfo.gender} · ${s.patientInfo.complaint}</div>
        ${s.sensorQuestions&&s.sensorQuestions.length>0?'<div style="margin-top:6px"><span style="background:rgba(232,160,32,.12);color:var(--warning);border:1px solid rgba(232,160,32,.3);border-radius:3px;padding:1px 7px;font-size:10px;font-family:var(--mono);font-weight:700">+ SENSOR</span></div>':''}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="color:var(--success);font-family:var(--mono);font-size:14px;font-weight:700">${s.totalMaxPoints+(s.sensorCriteria||[]).reduce((a,c)=>a+c.maxPoints,0)}p</div>
        <div style="color:var(--dim);font-family:var(--mono);font-size:10px">${s.timeMinutes} min</div>
      </div>
    </div>`).join('');
}

function selectStation(id){
  station=STATIONS.find(s=>s.id===id);
  renderBriefing();
  go('briefing');
}

// BRIEFING
function renderBriefing(){
  document.getElementById('b-chip').innerHTML=`<span style="background:rgba(45,125,210,.12);color:var(--accent);border:1px solid rgba(45,125,210,.3);border-radius:3px;padding:1px 7px;font-size:10px;font-family:var(--mono);font-weight:700;text-transform:uppercase">Klinisk stasjon</span>`;
  document.getElementById('b-title').textContent=station.stationName;
  document.getElementById('b-scenario').textContent=station.scenario;
  document.getElementById('b-tasks').innerHTML=station.tasks.map(t=>`<div>${t}</div>`).join('');
  document.getElementById('b-time').textContent=station.timeMinutes;
  const totalMax=station.totalMaxPoints+(station.sensorCriteria||[]).reduce((a,c)=>a+c.maxPoints,0);
  document.getElementById('b-max').textContent=totalMax;
  document.getElementById('b-pass').textContent=Math.ceil(totalMax*0.65);
}

// PRACTICE
function startPractice(){
  chatHistory=[];scores={};sensorIndex=0;sensorAnswers=[];
  document.getElementById('chat-inner').innerHTML='';
  document.getElementById('msg-input').value='';
  document.getElementById('p-title').textContent=station.stationName;
  document.getElementById('p-patient').textContent=`Pasient: ${station.patientInfo.name}, ${station.patientInfo.age} år`;
  document.getElementById('hint-tasks').innerHTML=station.tasks.map(t=>`<span>${t}</span>`).join('');
  updateLiveScore();
  go('practice');
  startTimer();
  const opener=`*Pasienten sitter og virker ukomfortabel*\n\nHei... takk for at du tar deg tid til meg. Det gjør vondt og jeg er litt bekymret.`;
  addMsg('assistant',opener);
  chatHistory.push({role:'assistant',content:opener});
}

function startTimer(){
  stopTimer();
  timeLeft=station.timeMinutes*60;
  renderTimer();
  timerInterval=setInterval(()=>{
    timeLeft--;renderTimer();
    if(timeLeft<=0){stopTimer();finishExam();}
  },1000);
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
function renderTimer(){
  const m=Math.floor(timeLeft/60),s=String(timeLeft%60).padStart(2,'0');
  const el=document.getElementById('timer');
  el.textContent=`${m}:${s}`;
  const c=timeLeft<60?'var(--danger)':timeLeft<120?'var(--warning)':'var(--success)';
  el.style.color=c;el.style.borderColor=c+'60';
}
function toggleHint(){
  const b=document.getElementById('hint-bar');
  b.style.display=b.style.display==='none'?'block':'none';
}
function updateLiveScore(){
  const total=Object.values(scores).reduce((a,b)=>a+b,0);
  const max=station.totalMaxPoints;
  const pct=max>0?Math.round(total/max*100):0;
  const c=pct>=65?'var(--success)':pct>=40?'var(--warning)':'var(--danger)';
  document.getElementById('live-bar').style.width=pct+'%';
  document.getElementById('live-bar').style.background=c;
  document.getElementById('live-score').textContent=`${total} / ${max}`;
  document.getElementById('live-score').style.color=c;
}

async function sendMsg(){
  const inp=document.getElementById('msg-input');
  const txt=inp.value.trim();
  if(!txt||isTrans)return;
  inp.value='';
  document.getElementById('send-btn').disabled=true;
  addMsg('user',txt);
  chatHistory.push({role:'user',content:txt});
  const tid=addTyping();
  try{
    const raw=await callGroqPatient(txt);
    removeEl(tid);
    let reply='',newScores={};
    try{
      // Try to find JSON block in response
      const start=raw.indexOf('{');
      const end=raw.lastIndexOf('}');
      const jsonStr=start>=0&&end>start?raw.slice(start,end+1):raw;
      const p=JSON.parse(jsonStr);
      reply=p.reply||'';
      newScores=p.scores||{};
    }catch(e){
      // If parse fails, strip anything that looks like JSON
      reply=raw.replace(/\{[^}]*\}/gs,'').trim()||raw;
    }
    addMsg('assistant',reply);
    chatHistory.push({role:'assistant',content:reply});
    const earned=[];
    for(const[id,pts]of Object.entries(newScores)){
      const crit=station.scoringCriteria.find(c=>c.id===parseInt(id));
      if(crit&&pts>0){
        const prev=scores[id]||0;
        if(pts>prev){scores[id]=Math.min(crit.maxPoints,pts);earned.push(crit.description);}
      }
    }
    updateLiveScore();
    if(earned.length>0)showToast(earned);
  }catch(e){
    removeEl(tid);
    addMsg('assistant','*[Noe gikk galt — prøv igjen]*');
  }finally{document.getElementById('send-btn').disabled=false;}
}

function showToast(descs){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:90px;right:20px;background:var(--success);color:#fff;padding:8px 14px;border-radius:8px;font-family:var(--mono);font-size:12px;z-index:9999;max-width:260px;animation:fadeIn .3s ease;line-height:1.6';
  t.innerHTML=descs.map(d=>`✓ ${esc(d)}`).join('<br>');
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

function finishExam(){
  stopTimer();
  if(station.sensorQuestions&&station.sensorQuestions.length>0){startSensor();}
  else{showScoring();}
}

// GROQ PATIENT
async function callGroqPatient(msg){
  const criteria=station.scoringCriteria.map(c=>`ID ${c.id}: "${c.description}" (maks ${c.maxPoints}p) — nøkkelord: ${c.keywords.join(', ')}`).join('\n');
  const system=`Du er en skuespillerpasient i en norsk OSKE-eksamen og en skjult vurderer.

PASIENT: ${station.patientInfo.name}, ${station.patientInfo.age} år, ${station.patientInfo.gender}
TILSTAND: ${station.patientContext}

PASIENTREGLER:
1. Svar alltid på norsk bokmål, hold deg i rollen
2. Vis realistiske emosjoner (smerte, engstelse)  
3. Avslør kun informasjon hvis studenten spør direkte
4. Hold svar korte (2-4 setninger)
5. Beskriv realistisk hvordan undersøkelser føles

SCORINGSKRITERIER (hemmelig):
${criteria}

Svar med GYLDIG JSON:
{"reply":"pasientens svar","scores":{"1":0,"2":1}}

I scores: sett 1 for kriterier studenten NETTOPP oppfylte med denne meldingen. Sett 0 ellers. Vær generøs – hvis studenten nevner nøkkelord eller utfører handlingen, gi poeng.`;

  return await callGroq(system,[...chatHistory,{role:'user',content:msg}]);
}

// SENSOR
function startSensor(){
  sensorIndex=0;
  renderSensorQ();
  go('sensor');
}
function renderSensorQ(){
  const q=station.sensorQuestions[sensorIndex];
  document.getElementById('sensor-question').textContent=q.question;
  document.getElementById('sensor-input').value='';
  document.getElementById('sensor-progress').textContent=`Spørsmål ${sensorIndex+1} av ${station.sensorQuestions.length}`;
}
async function submitSensorAnswer(){
  const ans=document.getElementById('sensor-input').value.trim();
  if(!ans)return;
  const btn=document.getElementById('sensor-submit-btn');
  btn.disabled=true;btn.textContent='Vurderer...';
  const q=station.sensorQuestions[sensorIndex];
  const criteriaForQ=(station.sensorCriteria||[]).filter(c=>q.scoringCriteriaIds.includes(c.id));
  let feedback='';
  try{
    const evalPrompt=`Vurder dette studentsvaret på et OSKE sensørspørsmål.
Spørsmål: "${q.question}"
Studentens svar: "${ans}"
Kriterier: ${criteriaForQ.map(c=>`ID ${c.id}: "${c.description}" (maks ${c.maxPoints}p)`).join('; ')}
Svar med gyldig JSON: {"scores":{"${criteriaForQ[0]?.id}":0},"feedback":"kort norsk tilbakemelding på 1-2 setninger"}`;
    const raw=await callGroq('Du er OSKE-eksaminator. Svar kun med gyldig JSON.',[{role:'user',content:evalPrompt}]);
    const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
    for(const[id,pts]of Object.entries(parsed.scores||{})){
      const crit=criteriaForQ.find(c=>c.id===parseInt(id));
      if(crit)scores[id]=Math.min(crit.maxPoints,pts);
    }
    feedback=parsed.feedback||'';
  }catch(e){feedback='';}
  sensorAnswers.push({question:q.question,answer:ans,feedback});
  btn.disabled=false;btn.textContent='Svar →';
  sensorIndex++;
  if(sensorIndex<station.sensorQuestions.length){renderSensorQ();}
  else{showScoring();}
}

// SCORING
function showScoring(){
  go('scoring');
  startScoringTimer();
  renderScoring();
}
function startScoringTimer(){
  scoringTimeLeft=180;updateScoringTimer();
  scoringTimerInterval=setInterval(()=>{
    scoringTimeLeft--;updateScoringTimer();
    if(scoringTimeLeft<=0)clearInterval(scoringTimerInterval);
  },1000);
}
function updateScoringTimer(){
  const m=Math.floor(scoringTimeLeft/60),s=String(scoringTimeLeft%60).padStart(2,'0');
  const el=document.getElementById('score-countdown');
  if(el)el.textContent=`Gjennomgangstid: ${m}:${s}`;
}
function renderScoring(){
  const allCriteria=[...station.scoringCriteria,...(station.sensorCriteria||[])];
  const total=Object.values(scores).reduce((a,b)=>a+b,0);
  const max=allCriteria.reduce((a,c)=>a+c.maxPoints,0);
  const pct=max>0?Math.round(total/max*100):0;
  const passed=pct>=65;
  const bc=pct>=65?'var(--success)':pct>=40?'var(--warning)':'var(--danger)';

  document.getElementById('score-header').innerHTML=`
    <div style="font-size:40px;margin-bottom:8px">${passed?'✅':'📚'}</div>
    <div style="font-family:var(--mono);font-size:32px;font-weight:700;color:${passed?'var(--success)':'var(--danger)'}">${total} / ${max}</div>
    <div style="color:var(--muted);font-family:var(--mono);font-size:13px;margin-top:4px">${pct}% — ${passed?'BESTÅTT':'IKKE BESTÅTT'} (grense: 65%)</div>
    <div style="margin-top:14px"><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${bc}"></div></div></div>`;

  // Sensor answers
  if(sensorAnswers.length>0){
    document.getElementById('score-sensor-answers').innerHTML=sensorAnswers.map(sa=>`
      <div class="panel" style="margin-bottom:12px;border-left:3px solid var(--warning)">
        <div style="font-family:var(--mono);color:var(--warning);font-size:11px;margin-bottom:6px">🎓 SENSOR</div>
        <div style="font-size:13px;color:var(--muted);margin-bottom:6px">${esc(sa.question)}</div>
        <div style="font-size:14px;line-height:1.5;margin-bottom:${sa.feedback?'8px':'0'}">${esc(sa.answer)}</div>
        ${sa.feedback?`<div style="font-family:var(--mono);font-size:12px;color:var(--accent);font-style:italic">↳ ${esc(sa.feedback)}</div>`:''}
      </div>`).join('');
  }

  // Detail
  const cats={};
  allCriteria.forEach(c=>{if(!cats[c.category])cats[c.category]=[];cats[c.category].push(c);});
  let html=`<div style="font-family:var(--mono);color:var(--muted);font-size:11px;letter-spacing:.1em;margin-bottom:16px">DETALJERT SKÅRING</div>`;
  for(const[cat,items]of Object.entries(cats)){
    html+=`<div style="margin-bottom:18px"><div style="color:var(--accent);font-family:var(--mono);font-size:11px;letter-spacing:.1em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border)">${cat.toUpperCase()}</div>`;
    for(const item of items){
      const got=scores[item.id]||0,max2=item.maxPoints;
      const c=got>=max2?'var(--success)':got>0?'var(--warning)':'var(--danger)';
      const icon=got>=max2?'✅':got>0?'⚡':'❌';
      html+=`<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:4px">
          <span style="font-size:13px;line-height:1.4;flex:1">${icon} ${esc(item.description)}</span>
          <span style="color:${c};font-family:var(--mono);font-size:13px;font-weight:700;white-space:nowrap">${got}/${max2}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${max2>0?Math.round(got/max2*100):0}%;background:${c}"></div></div>
      </div>`;
    }
    html+='</div>';
  }
  document.getElementById('score-detail').innerHTML=html;
}

// GROQ
async function callGroq(system,messages){
  const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ_KEY}`},
    body:JSON.stringify({model:GROQ_MODEL,messages:[{role:'system',content:system},...messages],temperature:0.7,max_tokens:600})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.choices[0].message.content;
}

// RECORDING
async function toggleRec(){
  if(isTrans)return;
  if(isRec){mediaRec?.stop();setRecUI(false);return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mime=['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4'].find(m=>MediaRecorder.isTypeSupported(m))||'';
    mediaRec=new MediaRecorder(stream,mime?{mimeType:mime}:{});
    audioChunks=[];
    mediaRec.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRec.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      setTransUI(true);
      try{const t=await transcribe(audioChunks,mediaRec.mimeType);if(t){const i=document.getElementById('msg-input');i.value=i.value?i.value+' '+t:t;}}
      finally{setTransUI(false);}
    };
    mediaRec.start();setRecUI(true);
  }catch(e){alert('Mikrofon tilgang nektet.');}
}
async function toggleSensorRec(){
  if(isSensorTrans)return;
  if(isSensorRec){sensorMediaRec?.stop();setSRec(false);return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mime=['audio/webm;codecs=opus','audio/webm','audio/ogg','audio/mp4'].find(m=>MediaRecorder.isTypeSupported(m))||'';
    sensorMediaRec=new MediaRecorder(stream,mime?{mimeType:mime}:{});
    sensorChunks=[];
    sensorMediaRec.ondataavailable=e=>{if(e.data.size>0)sensorChunks.push(e.data);};
    sensorMediaRec.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      setSTrans(true);
      try{const t=await transcribe(sensorChunks,sensorMediaRec.mimeType);if(t){const i=document.getElementById('sensor-input');i.value=i.value?i.value+' '+t:t;}}
      finally{setSTrans(false);}
    };
    sensorMediaRec.start();setSRec(true);
  }catch(e){alert('Mikrofon tilgang nektet.');}
}
async function transcribe(chunks,mimeType){
  const blob=new Blob(chunks,{type:mimeType||'audio/webm'});
  const ext=(mimeType||'').includes('mp4')?'mp4':(mimeType||'').includes('ogg')?'ogg':'webm';
  const fd=new FormData();
  fd.append('file',blob,`rec.${ext}`);
  fd.append('model',GROQ_WHISPER);
  fd.append('language','no');
  fd.append('response_format','text');
  const r=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{method:'POST',headers:{Authorization:`Bearer ${GROQ_KEY}`},body:fd});
  return (await r.text()).trim();
}
function setRecUI(a){
  isRec=a;
  const b=document.getElementById('mic-btn'),i=document.getElementById('rec-ind'),d=document.getElementById('rec-dot'),t=document.getElementById('rec-txt');
  b.textContent=a?'⏹️':'🎙️';b.style.borderColor=a?'var(--danger)':'var(--border)';b.style.background=a?'rgba(217,79,79,.2)':'var(--panel)';
  i.style.display=a?'flex':'none';
  if(a){i.style.background='rgba(217,79,79,.1)';i.style.border='1px solid rgba(217,79,79,.3)';d.style.background='var(--danger)';t.style.color='var(--danger)';t.textContent='TAR OPP... (trykk igjen for å stoppe)';}
}
function setTransUI(a){
  isTrans=a;
  const b=document.getElementById('mic-btn'),i=document.getElementById('rec-ind'),d=document.getElementById('rec-dot'),t=document.getElementById('rec-txt');
  b.textContent=a?'⏳':'🎙️';b.disabled=a;i.style.display=a?'flex':'none';
  if(a){i.style.background='rgba(45,125,210,.1)';i.style.border='1px solid rgba(45,125,210,.3)';d.style.background='var(--accent)';t.style.color='var(--accent)';t.textContent='TRANSKRIBERER...';}
}
function setSRec(a){
  isSensorRec=a;
  const b=document.getElementById('sensor-mic-btn'),i=document.getElementById('sensor-rec-ind'),d=document.getElementById('sensor-rec-dot'),t=document.getElementById('sensor-rec-txt');
  b.textContent=a?'⏹️':'🎙️';b.style.borderColor=a?'var(--danger)':'var(--border)';b.style.background=a?'rgba(217,79,79,.2)':'var(--panel)';
  i.style.display=a?'flex':'none';
  if(a){i.style.background='rgba(217,79,79,.1)';i.style.border='1px solid rgba(217,79,79,.3)';d.style.background='var(--danger)';t.style.color='var(--danger)';t.textContent='TAR OPP... (trykk igjen for å stoppe)';}
}
function setSTrans(a){
  isSensorTrans=a;
  const b=document.getElementById('sensor-mic-btn'),i=document.getElementById('sensor-rec-ind'),d=document.getElementById('sensor-rec-dot'),t=document.getElementById('sensor-rec-txt');
  b.textContent=a?'⏳':'🎙️';b.disabled=a;i.style.display=a?'flex':'none';
  if(a){i.style.background='rgba(45,125,210,.1)';i.style.border='1px solid rgba(45,125,210,.3)';d.style.background='var(--accent)';t.style.color='var(--accent)';t.textContent='TRANSKRIBERER...';}
}

// HELPERS
function addMsg(role,content){
  const inner=document.getElementById('chat-inner');
  const div=document.createElement('div');
  div.className='fade-in';
  div.style.cssText=`display:flex;justify-content:${role==='user'?'flex-end':'flex-start'}`;
  const av=role==='assistant'?`<div style="width:32px;height:32px;border-radius:50%;background:var(--hl);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;margin-right:8px;flex-shrink:0;margin-top:2px">🤒</div>`:'';
  div.innerHTML=`${av}<div style="max-width:75%;background:${role==='user'?'var(--accent)':'var(--panel)'};color:var(--text);padding:10px 14px;border-radius:${role==='user'?'12px 12px 4px 12px':'12px 12px 12px 4px'};border:1px solid ${role==='user'?'rgba(45,125,210,.6)':'var(--border)'};font-size:14px;line-height:1.6;white-space:pre-wrap">${esc(content)}</div>`;
  inner.appendChild(div);
  document.getElementById('chat').scrollTop=99999;
}
function addTyping(){
  const id='t'+Date.now();
  document.getElementById('chat-inner').insertAdjacentHTML('beforeend',`<div id="${id}" style="display:flex;align-items:center;gap:8px"><div style="width:32px;height:32px;border-radius:50%;background:var(--hl);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px">🤒</div><div style="color:var(--muted);font-family:var(--mono);font-size:13px">Pasienten tenker...</div></div>`);
  document.getElementById('chat').scrollTop=99999;
  return id;
}
function removeEl(id){document.getElementById(id)?.remove();}
function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

renderMenu();
go('menu');
