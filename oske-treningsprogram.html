<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSKE Treningsprogram</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060d1a;--surface:#0d1b2e;--panel:#112236;
  --border:#1a3050;--borderL:#1e3a5f;
  --accent:#2d7dd2;--success:#0fa87e;--warning:#e8a020;--danger:#d94f4f;
  --text:#dce8f5;--muted:#5a7a99;--dim:#3a5878;--hl:#0d2a4a;
  --mono:"IBM Plex Mono",monospace;--sans:"IBM Plex Sans",sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
button{cursor:pointer;font-family:var(--sans);border:none;transition:all 0.15s}
button:disabled{opacity:0.4;cursor:not-allowed}
textarea,input{font-family:var(--sans);color:var(--text);outline:none}
.screen{display:none}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px 20px}
.btn{border-radius:6px;font-weight:600;padding:10px 20px;font-size:14px}
.btn-primary{background:var(--accent);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-sm{padding:6px 14px;font-size:13px}
.bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.5s ease}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.pulse{animation:pulse 1s infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.3s ease}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="s-menu" class="screen" style="max-width:700px;margin:0 auto;padding:40px 20px">
  <div style="text-align:center;margin-bottom:48px">
    <div style="font-family:var(--mono);color:var(--dim);font-size:11px;letter-spacing:.2em;margin-bottom:12px">NORSK MEDISINSK UTDANNING</div>
    <h1 style="font-size:30px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px">OSKE Treningsprogram</h1>
    <p style="color:var(--muted);font-family:var(--mono);font-size:13px">Velg en stasjon og tren med AI-pasient</p>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
    <span style="font-family:var(--mono);color:var(--dim);font-size:11px;letter-spacing:.15em">SKULDER</span>
    <div style="height:1px;background:var(--border);flex:1"></div>
  </div>
  <div id="sl-skulder" style="display:flex;flex-direction:column;gap:10px"></div>
  <div style="display:flex;align-items:center;gap:10px;margin:24px 0 16px">
    <span style="font-family:var(--mono);color:var(--dim);font-size:11px;letter-spacing:.15em">HAND / HANDLEDD</span>
    <div style="height:1px;background:var(--border);flex:1"></div>
  </div>
  <div id="sl-hand" style="display:flex;flex-direction:column;gap:10px"></div>
  <div style="display:flex;align-items:center;gap:10px;margin:24px 0 16px">
    <span style="font-family:var(--mono);color:var(--dim);font-size:11px;letter-spacing:.15em">KNE</span>
    <div style="height:1px;background:var(--border);flex:1"></div>
  </div>
  <div id="sl-kne" style="display:flex;flex-direction:column;gap:10px"></div>
</div>

<div id="s-briefing" class="screen" style="max-width:700px;margin:0 auto;padding:32px 20px">
  <button class="btn btn-ghost btn-sm" onclick="go('menu')" style="margin-bottom:24px">← Tilbake</button>
  <h1 id="b-title" style="font-size:22px;font-weight:700;margin:8px 0 24px"></h1>
  <div id="b-xray" style="margin-bottom:16px"></div>
  <div class="panel" style="margin-bottom:16px;border-left:3px solid var(--accent)">
    <div style="font-family:var(--mono);color:var(--muted);font-size:11px;letter-spacing:.1em;margin-bottom:10px">SCENARIO</div>
    <p id="b-scenario" style="font-size:15px;line-height:1.7"></p>
  </div>
  <div class="panel" style="margin-bottom:16px">
    <div style="font-family:var(--mono);color:var(--muted);font-size:11px;letter-spacing:.1em;margin-bottom:10px">OPPGAVER</div>
    <div id="b-tasks" style="display:flex;flex-direction:column;gap:8px;font-size:14px;line-height:1.5"></div>
  </div>
  <div style="display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap">
    <div class="panel" style="flex:1;min-width:100px;text-align:center;padding:14px">
      <div id="b-time" style="color:var(--accent);font-family:var(--mono);font-size:22px;font-weight:700"></div>
      <div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px">minutter</div>
    </div>
    <div class="panel" style="flex:1;min-width:100px;text-align:center;padding:14px">
      <div id="b-max" style="color:var(--success);font-family:var(--mono);font-size:22px;font-weight:700"></div>
      <div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px">maks poeng</div>
    </div>
    <div class="panel" style="flex:1;min-width:100px;text-align:center;padding:14px">
      <div id="b-pass" style="color:var(--warning);font-family:var(--mono);font-size:22px;font-weight:700"></div>
      <div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px">bestatt (65%)</div>
    </div>
  </div>
  <button class="btn btn-primary" style="width:100%" onclick="startPractice()">Start ovelse</button>
</div>

<div id="s-practice" class="screen" style="height:100vh;flex-direction:column">
  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
    <div>
      <div id="p-title" style="font-weight:600;font-size:14px"></div>
      <div id="p-patient" style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:1px"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="timer" style="background:var(--panel);border:1px solid var(--success);border-radius:8px;padding:5px 12px;font-family:var(--mono);font-size:17px;font-weight:700;color:var(--success);min-width:65px;text-align:center">7:00</div>
      <button class="btn btn-ghost btn-sm" onclick="toggleHint()">Hint</button>
      <button class="btn btn-success btn-sm" onclick="finishExam()">Avslutt</button>
    </div>
  </div>
  <div id="hint-bar" style="display:none;background:var(--hl);border-bottom:1px solid rgba(45,125,210,.2);padding:8px 20px">
    <div style="font-family:var(--mono);color:var(--muted);font-size:11px;margin-bottom:4px">OPPGAVER</div>
    <div id="hint-tasks" style="font-family:var(--mono);font-size:12px;color:var(--text);display:flex;flex-wrap:wrap;gap:12px"></div>
  </div>
  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:6px 20px;display:flex;align-items:center;gap:12px">
    <span style="font-family:var(--mono);color:var(--muted);font-size:11px;white-space:nowrap">POENG</span>
    <div class="bar-track" style="flex:1"><div id="live-bar" class="bar-fill" style="width:0%;background:var(--success)"></div></div>
    <span id="live-score" style="font-family:var(--mono);font-size:12px;color:var(--success);min-width:50px;text-align:right">0/0</span>
  </div>
  <div id="chat" style="flex:1;overflow-y:auto;padding:16px 20px 8px">
    <div id="chat-inner" style="max-width:660px;margin:0 auto;display:flex;flex-direction:column;gap:14px"></div>
  </div>
  <div style="background:var(--surface);border-top:1px solid var(--border);padding:12px 20px">
    <div style="max-width:660px;margin:0 auto">
      <div id="rec-ind" style="display:none;align-items:center;gap:8px;margin-bottom:8px;padding:5px 10px;border-radius:6px">
        <div id="rec-dot" style="width:8px;height:8px;border-radius:50%" class="pulse"></div>
        <span id="rec-txt" style="font-family:var(--mono);font-size:11px"></span>
      </div>
      <div style="display:flex;gap:8px">
        <textarea id="msg-input" rows="2" placeholder="Snakk eller skriv til pasienten..."
          style="flex:1;background:var(--panel);border:1px solid var(--borderL);border-radius:8px;padding:10px 14px;font-size:14px;resize:none;line-height:1.5"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
        <div style="display:flex;flex-direction:column;gap:6px;justify-content:flex-end">
          <button id="mic-btn" onclick="toggleRec()" style="width:40px;height:40px;border-radius:8px;border:1px solid var(--border);background:var(--panel);font-size:17px;display:flex;align-items:center;justify-content:center">&#127897;</button>
          <button class="btn btn-primary btn-sm" onclick="sendMsg()" id="send-btn">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="s-sensor" class="screen" style="max-width:700px;margin:0 auto;padding:32px 20px">
  <div style="text-align:center;margin-bottom:24px">
    <div style="font-size:32px;margin-bottom:8px">&#127891;</div>
    <h2 style="font-size:20px;font-weight:700">Sensorsporsmal</h2>
  </div>
  <div class="panel" style="margin-bottom:20px;border-left:3px solid var(--warning)">
    <div style="font-family:var(--mono);color:var(--warning);font-size:11px;letter-spacing:.1em;margin-bottom:10px">SENSOR SPOR</div>
    <p id="sensor-question" style="font-size:15px;line-height:1.7"></p>
  </div>
  <div id="sensor-rec-ind" style="display:none;align-items:center;gap:8px;margin-bottom:8px;padding:5px 10px;border-radius:6px">
    <div id="sensor-rec-dot" style="width:8px;height:8px;border-radius:50%" class="pulse"></div>
    <span id="sensor-rec-txt" style="font-family:var(--mono);font-size:11px"></span>
  </div>
  <textarea id="sensor-input" rows="4" placeholder="Skriv eller snakk svaret ditt..."
    style="width:100%;background:var(--panel);border:1px solid var(--borderL);border-radius:8px;padding:12px 14px;font-size:14px;resize:none;line-height:1.6;margin-bottom:12px"></textarea>
  <div style="display:flex;gap:10px;margin-bottom:16px">
    <button id="sensor-mic-btn" onclick="toggleSensorRec()" style="width:40px;height:40px;border-radius:8px;border:1px solid var(--border);background:var(--panel);font-size:17px;display:flex;align-items:center;justify-content:center">&#127897;</button>
    <button class="btn btn-primary" style="flex:1" onclick="submitSensorAnswer()" id="sensor-submit-btn">Svar</button>
  </div>
  <div style="text-align:center"><span id="sensor-progress" style="font-family:var(--mono);color:var(--muted);font-size:12px"></span></div>
</div>

<div id="s-scoring" class="screen" style="max-width:700px;margin:0 auto;padding:32px 20px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px">
    <button class="btn btn-ghost btn-sm" onclick="go('practice')">Se samtalen</button>
    <div id="score-countdown" style="font-family:var(--mono);font-size:13px;color:var(--muted)"></div>
  </div>
  <div id="score-header" class="panel" style="margin-bottom:20px;text-align:center;padding:28px 24px"></div>
  <div id="score-sensor-answers" style="margin-bottom:20px"></div>
  <div id="score-detail" class="panel" style="margin-bottom:24px"></div>
  <div style="display:flex;gap:12px;justify-content:center">
    <button class="btn btn-outline" onclick="go('practice')">Se samtalen</button>
    <button class="btn btn-primary" onclick="go('menu')">Ny stasjon</button>
  </div>
</div>

<script src="oske-images.js"></script>

async function sendMsg(){
  const inp=document.getElementById("msg-input");
  const txt=inp.value.trim();
  if(!txt||isTrans)return;
  inp.value="";
  document.getElementById("send-btn").disabled=true;
  addMsg("user",txt);
  chatHistory.push({role:"user",content:txt});
  const tid=addTyping();
  try{
    const raw=await callGroqPatient(txt);
    removeEl(tid);
    let reply="",newScores={};
    try{
      const start=raw.indexOf("{");const end=raw.lastIndexOf("}");
      const p=JSON.parse(start>=0&&end>start?raw.slice(start,end+1):raw);
      reply=p.reply||"";newScores=p.scores||{};
    }catch(e){reply=raw.replace(/\{[^}]*\}/gs,"").trim()||raw;}
    addMsg("assistant",reply);
    chatHistory.push({role:"assistant",content:reply});
    const earned=[];
    for(const[id,pts]of Object.entries(newScores)){
      const crit=station.scoringCriteria.find(c=>c.id===parseInt(id));
      if(crit&&pts>0){const prev=scores[id]||0;if(pts>prev){scores[id]=Math.min(crit.maxPoints,pts);earned.push(crit.description);}}
    }
    updateLiveScore();
    if(earned.length>0)showToast(earned);
  }catch(e){removeEl(tid);addMsg("assistant","*[Noe gikk galt - prov igjen]*");}
  finally{document.getElementById("send-btn").disabled=false;}
}

async function callGroqPatient(msg){
  const criteria=station.scoringCriteria.map(c=>`ID ${c.id}: "${c.description}" (maks ${c.maxPoints}p) - nokkelord: ${c.keywords.join(", ")}`).join("\n");
  const system=`Du er en skuespillerpasient i en norsk OSKE-eksamen og en skjult vurderer.
PASIENT: ${station.patientInfo.name}, ${station.patientInfo.age} ar, ${station.patientInfo.gender}
TILSTAND: ${station.patientContext}
REGLER: Svar pa norsk bokmal, hold rollen, vis emosjoner, avslor kun ved direkte sporsmal, svar kort (2-4 setninger).
SCORINGSKRITERIER (hemmelig): ${criteria}
Svar med GYLDIG JSON: {"reply":"pasientens svar","scores":{"1":0,"2":1}}`;
  return await callGroq(system,[...chatHistory,{role:"user",content:msg}]);
}

async function submitSensorAnswer(){
  const ans=document.getElementById("sensor-input").value.trim();
  if(!ans)return;
  const btn=document.getElementById("sensor-submit-btn");
  btn.disabled=true;btn.textContent="Vurderer...";
  const q=station.sensorQuestions[sensorIndex];
  const criteriaForQ=(station.sensorCriteria||[]).filter(c=>q.scoringCriteriaIds.includes(c.id));
  let feedback="";
  try{
    const evalPrompt=`Vurder studentsvaret. Sporsmal: "${q.question}" Svar: "${ans}" Kriterier: ${criteriaForQ.map(c=>`ID ${c.id}: "${c.description}" (maks ${c.maxPoints}p)`).join("; ")} Svar med JSON: {"scores":{"${criteriaForQ[0]?.id||20}":0},"feedback":"kort norsk tilbakemelding"}`;
    const raw=await callGroq("Du er OSKE-eksaminator. Svar kun med gyldig JSON.",[{role:"user",content:evalPrompt}]);
    const clean=raw.replace(/```json|```/g,"").trim();
    const start=clean.indexOf("{");const end=clean.lastIndexOf("}");
    const parsed=JSON.parse(start>=0?clean.slice(start,end+1):clean);
    for(const[id,pts]of Object.entries(parsed.scores||{})){
      const crit=criteriaForQ.find(c=>c.id===parseInt(id));
      if(crit)scores[id]=Math.min(crit.maxPoints,pts);
    }
    feedback=parsed.feedback||"";
  }catch(e){feedback="";}
  sensorAnswers.push({question:q.question,answer:ans,feedback});
  btn.disabled=false;btn.textContent="Svar";
  sensorIndex++;
  if(sensorIndex<station.sensorQuestions.length)renderSensorQ();
  else showScoring();
}

async function callGroq(system,messages){
  const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
    body:JSON.stringify({model:GROQ_MODEL,messages:[{role:"system",content:system},...messages],temperature:0.7,max_tokens:600})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.choices[0].message.content;
}

async function toggleRec(){
  if(isTrans)return;
  if(isRec){mediaRec?.stop();setRecUI(false);return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mime=["audio/webm;codecs=opus","audio/webm","audio/ogg","audio/mp4"].find(m=>MediaRecorder.isTypeSupported(m))||"";
    mediaRec=new MediaRecorder(stream,mime?{mimeType:mime}:{});
    audioChunks=[];
    mediaRec.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRec.onstop=async()=>{stream.getTracks().forEach(t=>t.stop());setTransUI(true);try{const t=await transcribe(audioChunks,mediaRec.mimeType);if(t){const i=document.getElementById("msg-input");i.value=i.value?i.value+" "+t:t;}}finally{setTransUI(false);}};
    mediaRec.start();setRecUI(true);
  }catch(e){alert("Mikrofon tilgang nektet.");}
}
async function toggleSensorRec(){
  if(isSensorTrans)return;
  if(isSensorRec){sensorMediaRec?.stop();setSRec(false);return;}
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mime=["audio/webm;codecs=opus","audio/webm","audio/ogg","audio/mp4"].find(m=>MediaRecorder.isTypeSupported(m))||"";
    sensorMediaRec=new MediaRecorder(stream,mime?{mimeType:mime}:{});
    sensorChunks=[];
    sensorMediaRec.ondataavailable=e=>{if(e.data.size>0)sensorChunks.push(e.data);};
    sensorMediaRec.onstop=async()=>{stream.getTracks().forEach(t=>t.stop());setSTrans(true);try{const t=await transcribe(sensorChunks,sensorMediaRec.mimeType);if(t){const i=document.getElementById("sensor-input");i.value=i.value?i.value+" "+t:t;}}finally{setSTrans(false);}};
    sensorMediaRec.start();setSRec(true);
  }catch(e){alert("Mikrofon tilgang nektet.");}
}
async function transcribe(chunks,mimeType){
  const blob=new Blob(chunks,{type:mimeType||"audio/webm"});
  const ext=(mimeType||"").includes("mp4")?"mp4":(mimeType||"").includes("ogg")?"ogg":"webm";
  const fd=new FormData();
  fd.append("file",blob,`rec.${ext}`);fd.append("model",GROQ_WHISPER);fd.append("language","no");fd.append("response_format","text");
  const r=await fetch("https://api.groq.com/openai/v1/audio/transcriptions",{method:"POST",headers:{Authorization:`Bearer ${GROQ_KEY}`},body:fd});
  return (await r.text()).trim();
}

function setTransUI(a){isTrans=a;const b=document.getElementById("mic-btn"),i=document.getElementById("rec-ind"),d=document.getElementById("rec-dot"),t=document.getElementById("rec-txt");b.textContent=a?"...":"MIC";b.disabled=a;i.style.display=a?"flex":"none";if(a){i.style.background="rgba(45,125,210,.1)";i.style.border="1px solid rgba(45,125,210,.3)";d.style.background="var(--accent)";t.style.color="var(--accent)";t.textContent="TRANSKRIBERER...";}}
function setSRec(a){isSensorRec=a;const b=document.getElementById("sensor-mic-btn"),i=document.getElementById("sensor-rec-ind"),d=document.getElementById("sensor-rec-dot"),t=document.getElementById("sensor-rec-txt");b.textContent=a?"STOPP":"MIC";b.style.borderColor=a?"var(--danger)":"var(--border)";b.style.background=a?"rgba(217,79,79,.2)":"var(--panel)";i.style.display=a?"flex":"none";if(a){i.style.background="rgba(217,79,79,.1)";i.style.border="1px solid rgba(217,79,79,.3)";d.style.background="var(--danger)";t.style.color="var(--danger)";t.textContent="TAR OPP...";}}
function setSTrans(a){isSensorTrans=a;const b=document.getElementById("sensor-mic-btn"),i=document.getElementById("sensor-rec-ind"),d=document.getElementById("sensor-rec-dot"),t=document.getElementById("sensor-rec-txt");b.textContent=a?"...":"MIC";b.disabled=a;i.style.display=a?"flex":"none";if(a){i.style.background="rgba(45,125,210,.1)";i.style.border="1px solid rgba(45,125,210,.3)";d.style.background="var(--accent)";t.style.color="var(--accent)";t.textContent="TRANSKRIBERER...";}}
function addMsg(role,content){
  const inner=document.getElementById("chat-inner");
  const div=document.createElement("div");div.className="fade-in";
  div.style.cssText=`display:flex;justify-content:${role==="user"?"flex-end":"flex-start"}`;
  const av=role==="assistant"?`<div style="width:32px;height:32px;border-radius:50%;background:var(--hl);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;margin-right:8px;flex-shrink:0;margin-top:2px">P</div>`:"";
  div.innerHTML=`${av}<div style="max-width:75%;background:${role==="user"?"var(--accent)":"var(--panel)"};color:var(--text);padding:10px 14px;border-radius:${role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px"};border:1px solid ${role==="user"?"rgba(45,125,210,.6)":"var(--border)"};font-size:14px;line-height:1.6;white-space:pre-wrap">${esc(content)}</div>`;
  inner.appendChild(div);document.getElementById("chat").scrollTop=99999;
}
function addTyping(){const id="t"+Date.now();document.getElementById("chat-inner").insertAdjacentHTML("beforeend",`<div id="${id}" style="display:flex;align-items:center;gap:8px"><div style="width:32px;height:32px;border-radius:50%;background:var(--hl);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px">P</div><div style="color:var(--muted);font-family:var(--mono);font-size:13px">tenker...</div></div>`);document.getElementById("chat").scrollTop=99999;return id;}
function removeEl(id){document.getElementById(id)?.remove();}
function esc(t){return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
const SKULDER_IMAGES={"Aktiv bevegelighet":["aktiv"],"Passiv bevegelighet":["passiv_utad","passiv_utad2","passiv_abd","passiv_innad"],"Isometriske tester":["isometrisk"],"Isometriske prover":["isometrisk"],"Cross Body test":["crossbody"],"Cross body-test":["crossbody"],"Impingementtest":["hawkins"],"Apprehension/relocation":["apprehension","relocation"],"Sulcustegn":["sulcus"],"Skuffetest":["skuffe"]};
const SKULDER_TEXT_CARDS={"Inspeksjon":["Ser etter feilstillinger","Atrofi (supraspinatus, infraspinatus, deltoideus)","Fargeendringer / hematom","Vingescapula (be pasienten trykke mot veggen)","Skulderhoyде – symmetri?"],"Palpasjon":["Palper subacromialt og eventuelt muskulatur","Glenohumeral leddet","Sternoklaviculærleddet","Clavicula","Acromioclavicular leddet (AC-leddet)"]};
const HAND_TEXT_CARDS={"Inspeksjon":["Hudfarge (cyanose, rodhet, misfarging)","Hevelse – lokalisasjon?","Feilstillinger (knokler, fingre)","Atrofier (thenar, hypothenar, interossei)","Tumor / kul"]};

function getImagesForCriterion(desc){
  for(const[key,imgs]of Object.entries(SKULDER_IMAGES)){if(desc.toLowerCase().includes(key.toLowerCase()))return imgs;}
  for(const[key,imgs]of Object.entries(HAND_IMAGES)){if(desc.toLowerCase().includes(key.toLowerCase()))return imgs;}
  return null;
}
function getTextCardForCriterion(desc){
  for(const[key,items]of Object.entries(SKULDER_TEXT_CARDS)){if(desc.toLowerCase().includes(key.toLowerCase()))return items;}
  for(const[key,items]of Object.entries(HAND_TEXT_CARDS)){if(desc.toLowerCase().includes(key.toLowerCase()))return items;}
  return null;
}
function handleBtnClick(id){const data=window._btnData&&window._btnData[id];if(!data)return;if(data.type==="img")showImageModal(data.keys);else if(data.type==="text")showTextModal(data.title,data.items);}
function showImageModal(keys){
  const ex=document.getElementById("img-modal");if(ex)ex.remove();
  const modal=document.createElement("div");modal.id="img-modal";
  modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto";
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  const inner=document.createElement("div");inner.style.cssText="max-width:700px;width:100%;display:flex;flex-direction:column;gap:12px;align-items:center";
  keys.forEach(k=>{if(IMG[k]){const img=document.createElement("img");img.src=IMG[k];img.style.cssText="max-width:100%;border-radius:8px;background:#fff";inner.appendChild(img);}});
  const cb=document.createElement("button");cb.textContent="Lukk";cb.style.cssText="margin-top:8px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:var(--sans)";cb.onclick=()=>modal.remove();
  inner.appendChild(cb);modal.appendChild(inner);document.body.appendChild(modal);
}
function showTextModal(title,items){
  const ex=document.getElementById("img-modal");if(ex)ex.remove();
  const modal=document.createElement("div");modal.id="img-modal";
  modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px";
  modal.onclick=e=>{if(e.target===modal)modal.remove();};
  const card=document.createElement("div");card.style.cssText="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:440px;width:100%";
  card.innerHTML=`<div style="font-family:var(--mono);color:var(--accent);font-size:11px;letter-spacing:.1em;margin-bottom:12px">${title.toUpperCase()}</div><div style="display:flex;flex-direction:column;gap:10px">${items.map(i=>`<div style="font-size:14px;line-height:1.5;padding:8px 12px;background:var(--hl);border-radius:6px;border-left:3px solid var(--accent)">${i}</div>`).join("")}</div><button onclick="document.getElementById('img-modal').remove()" style="margin-top:16px;width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:var(--sans);font-weight:600">Lukk</button>`;
  modal.appendChild(card);document.body.appendChild(modal);
}
